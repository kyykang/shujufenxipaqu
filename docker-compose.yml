version: '3.8'

services:
  oa-scraper:
    image: mcr.microsoft.com/playwright/python:v1.40.0-jammy
    container_name: oa-scraper
    working_dir: /app
    volumes:
      - ./:/app
      - ./screenshots:/app/screenshots
      - ./output:/app/output
    environment:
      - TZ=Asia/Shanghai
    command: python3 click_dashboard_final.py
    restart: "no"
